<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket DJ - Persistent Storage</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 10px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; max-width: 800px; margin: auto; border: 1px solid #333; }
        .status { margin: 10px; font-size: 14px; font-weight: bold; }
        .btn-connect { background: #00e676; color: black; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 10px; }
        textarea { width: 100%; height: 80px; background: #000; color: #00e676; border: 1px solid #333; border-radius: 10px; padding: 10px; font-size: 14px; margin-bottom: 10px; font-family: monospace; }
        
        /* ปุ่มบันทึกลงบอร์ด */
        .btn-save-board { background: #ff9800; color: black; width: 100%; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .btn-fx { 
            background: #2a2a2a; color: #bbb; border: 1px solid #444; height: 60px; 
            display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 8px; 
        }
        .btn-fx.active { background: #00e676; color: black; border-color: #fff; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🎛️ Pocket DJ Sync System</h3>
        <div id="status" class="status" style="color:#ff5252;">● Disconnected</div>
        <button id="connectBtn" class="btn-connect">CONNECT & SYNC</button>

        <div style="text-align: left; font-size: 12px; color: #00e676;">LIVE EDITOR</div>
        <textarea id="liveInput" placeholder="แก้ไขลายไฟที่นี่..."></textarea>
        
        <button id="saveToBoardBtn" class="btn-save-board">💾 SAVE CURRENT TO ESP32</button>

        <div style="text-align: left; font-size: 12px; color: #bbb;">FX LIBRARY (SYNCED FROM BOARD)</div>
        <div id="presetGrid" class="preset-grid"></div>
    </div>

    <script>
        let device, characteristic;
        let selectedIndex = -1;
        let patterns = Array(50).fill("off"); // เตรียมที่ว่าง 50 ช่อง

        const liveInput = document.getElementById('liveInput');
        const presetGrid = document.getElementById('presetGrid');

        // 1. วาดปุ่มจากข้อมูลที่มี
        function renderButtons() {
            presetGrid.innerHTML = '';
            patterns.forEach((code, index) => {
                const btn = document.createElement('div');
                btn.className = 'btn-fx' + (selectedIndex === index ? ' active' : '');
                btn.innerText = "FX " + (index + 1);
                btn.onclick = () => {
                    selectedIndex = index;
                    liveInput.value = patterns[index];
                    renderButtons();
                    sendBluetooth(patterns[index]); // เล่นทันที
                };
                presetGrid.appendChild(btn);
            });
        }

        // 2. เมื่อกด Save: ส่งคำสั่งพิเศษไปให้ ESP32 บันทึก
        document.getElementById('saveToBoardBtn').onclick = () => {
            if (selectedIndex === -1) return alert("โปรดเลือกปุ่มก่อนบันทึก");
            const newCode = liveInput.value;
            patterns[selectedIndex] = newCode;
            // ส่งคำสั่งรูปแบบ "S[index]:[code]" เช่น "S5:(0010,re...)"
            sendBluetooth("S" + selectedIndex + ":" + newCode);
            alert("บันทึกลง ESP32 สำเร็จ!");
        };

        // 3. ระบบเชื่อมต่อและ Sync ข้อมูลกลับ
        document.getElementById('connectBtn').onclick = async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'PocketDJ-' }],
                    optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
                characteristic = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");

                // เริ่มการฟังข้อมูลที่ส่งกลับมาจากบอร์ด
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                document.getElementById('status').innerText = "● Connected Syncing...";
                // ส่งคำสั่งขอข้อมูลทั้งหมดจากบอร์ด
                sendBluetooth("GET_ALL"); 

            } catch (e) { console.log(e); }
        };

        function handleNotifications(event) {
            let value = new TextDecoder().decode(event.target.value);
            // รับข้อมูลรูปแบบ "D[index]:[code]"
            if (value.startsWith("D")) {
                let parts = value.substring(1).split(":");
                let idx = parseInt(parts[0]);
                let code = parts[1];
                patterns[idx] = code;
                renderButtons();
                document.getElementById('status').innerText = "● Ready (Synced " + (idx+1) + "/50)";
            }
        }

        async function sendBluetooth(val) {
            if (!characteristic) return;
            try {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(val));
            } catch (e) { console.log(e); }
        }

        renderButtons();
    </script>
</body>
</html>
