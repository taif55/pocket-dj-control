<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Test Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #222; color: white; }
        .btn { padding: 15px 25px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; }
        .connect { background: #4CAF50; color: white; width: 100%; max-width: 300px; }
        .disconnect { background: #f44336; color: white; display: none; width: 100%; max-width: 300px; }
        .cmd-btn { background: #2196F3; color: white; width: 140px; }
        #status { margin: 20px; padding: 10px; border: 1px solid #555; background: #333; }
    </style>
</head>
<body>

    <h2>ESP32 Bluetooth Test</h2>
    
    <button id="btnConnect" class="btn connect" onclick="onConnectClick()">1. เชื่อมต่อบลูทูธ</button>
    <button id="btnDisconnect" class="btn disconnect" onclick="onDisconnectClick()">ตัดการเชื่อมต่อ</button>

    <div id="status">สถานะ: ยังไม่ได้เชื่อมต่อ</div>

    <hr>

    <h3>2. ส่งคำสั่งทดสอบ</h3>
    <div style="display: flex; justify-content: center; flex-wrap: wrap;">
        <button class="btn cmd-btn" onclick="sendData('5m(0019,ab,ye,u1500,1)')">ลายสีเหลือง</button>
        <button class="btn cmd-btn" onclick="sendData('5(0019,cd,bl,u1000,1)')">ลายสีน้ำเงิน</button>
        <button class="btn cmd-btn" onclick="sendData('off')">ปิดไฟ (OFF)</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const CHARACTERISTIC_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

        async function onConnectClick() {
            try {
                document.getElementById('status').innerText = "กำลังค้นหาอุปกรณ์...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'PocketDJ' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                document.getElementById('status').innerText = "✅ เชื่อมต่อแล้ว: " + device.name;
                document.getElementById('btnConnect').style.display = 'none';
                document.getElementById('btnDisconnect').style.display = 'inline-block';
                
                device.addEventListener('gattserverdisconnected', () => {
                    location.reload(); 
                });
            } catch (error) {
                document.getElementById('status').innerText = "❌ Error: " + error;
            }
        }

        async function onDisconnectClick() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
        }

        async function sendData(data) {
            if (!characteristic) {
                alert("กรุณาเชื่อมต่อบลูทูธก่อน");
                return;
            }
            try {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(data));
                document.getElementById('status').innerText = "🚀 ส่งสำเร็จ: " + data;
            } catch (error) {
                document.getElementById('status').innerText = "❌ ส่งไม่สำเร็จ: " + error;
            }
        }
    </script>
</body>
</html>
