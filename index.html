<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket DJ Remote Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: #4285F4; margin-bottom: 10px; }
        .status-box {
            background: #252525;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .btn-connect {
            background: linear-gradient(135deg, #ea4335, #c5221f);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(234, 67, 53, 0.3);
        }
        .btn-connect.connected {
            background: linear-gradient(135deg, #34a853, #2d8e47);
            box-shadow: 0 4px 15px rgba(52, 168, 83, 0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn-fx {
            background: #333;
            color: white;
            border: 2px solid #444;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        .btn-fx:active { transform: scale(0.95); background: #444; }
        .btn-fx.yellow { border-color: #fbbc05; color: #fbbc05; }
        .btn-fx.blue { border-color: #4285F4; color: #4285F4; }
        .footer { margin-top: 20px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pocket DJ Remote</h2>
        <div id="statusMsg" class="status-box">สถานะ: รอการเชื่อมต่อ</div>

        <button id="connectBtn" onclick="connectBLE()" class="btn-connect">
            🔴 เชื่อมต่อบลูทูธ
        </button>

        <div class="grid">
            <button class="btn-fx yellow" onclick="sendPattern('m0099,ab,ye,u15,1')">✨ ลายสีเหลือง</button>
            <button class="btn-fx blue" onclick="sendPattern('m0099,cd,bl,f10,1')">🌊 ลายน้ำเงิน</button>
            <button class="btn-fx" onclick="sendPattern('m0099,ef,re,u05,0')">🔥 ลายไฟแดง</button>
            <button class="btn-fx" onclick="sendPattern('off')">🌑 ปิดไฟ</button>
        </div>

        <div class="footer">
            พัฒนาโดย Bang Dul | เฉพาะ Chrome บน Android/Windows
        </div>
    </div>

    <script>
        let bleDevice;
        let bleCharacteristic;

        // ต้องใช้ Service UUID ให้ตรงกับในโค้ด ESP32
        const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const CHARACTERISTIC_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

        async function connectBLE() {
            const status = document.getElementById("statusMsg");
            const btn = document.getElementById("connectBtn");

            try {
                status.innerText = "กำลังค้นหาอุปกรณ์...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'PocketDJ' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                status.innerText = "✅ เชื่อมต่อสำเร็จ: " + bleDevice.name;
                btn.innerText = "🟢 เชื่อมต่อแล้ว";
                btn.className = "btn-connect connected";

                // ดักฟังการตัดการเชื่อมต่อ
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (error) {
                console.error(error);
                status.innerText = "❌ ผิดพลาด: " + error.message;
            }
        }

        function onDisconnected() {
            const status = document.getElementById("statusMsg");
            const btn = document.getElementById("connectBtn");
            status.innerText = "⚠️ การเชื่อมต่อหลุด";
            btn.innerText = "🔴 เชื่อมต่อใหม่";
            btn.className = "btn-connect";
            bleCharacteristic = null;
        }

        async function sendPattern(pattern) {
            const status = document.getElementById("statusMsg");
            if (bleCharacteristic) {
                try {
                    const encoder = new TextEncoder();
                    await bleCharacteristic.writeValue(encoder.encode(pattern));
                    status.innerText = "🚀 ส่งคำสั่ง: " + pattern;
                } catch (error) {
                    status.innerText = "❌ ส่งข้อมูลไม่สำเร็จ: " + error;
                }
            } else {
                alert("กรุณาเชื่อมต่อบลูทูธก่อนครับ");
            }
        }
    </script>
</body>
</html>
