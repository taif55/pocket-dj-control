<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket DJ - Master Sync Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 10px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; max-width: 800px; margin: auto; border: 1px solid #333; }
        .status { margin: 10px; font-size: 14px; font-weight: bold; transition: 0.3s; }
        
        .btn-connect { background: #00e676; color: black; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; border: none; cursor: pointer; }
        
        textarea { 
            width: 100%; height: 90px; background: #000; color: #00e676; border: 1px solid #333; 
            border-radius: 12px; padding: 12px; font-size: 15px; margin-bottom: 5px; font-family: 'Courier New', monospace;
            resize: none; outline: none; box-sizing: border-box;
        }
        #saveIndicator { font-size: 11px; height: 15px; margin-bottom: 10px; color: #666; font-weight: bold; }

        .slider-box { background: #252525; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .slider-header { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 8px; }
        input[type=range] { width: 100%; accent-color: #00e676; cursor: pointer; }

        .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .btn-fx { 
            background: #2a2a2a; color: #bbb; border: 1px solid #444; height: 65px; 
            display: flex; align-items: center; justify-content: center; font-size: 11px; 
            border-radius: 10px; cursor: grab; user-select: none; touch-action: manipulation;
        }
        .btn-fx.active { background: #00e676; color: black; border-color: #fff; font-weight: bold; }
        .sortable-ghost { opacity: 0.3; background: #00e676 !important; }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="margin-top:0;">🎛️ Pocket DJ Master Sync</h3>
        <div id="status" class="status" style="color:#ff5252;">● Disconnected</div>
        <button id="connectBtn" class="btn-connect">CONNECT & SYNC ALL</button>

        <div style="text-align: left; font-size: 12px; color: #00e676; font-weight: bold;">LIVE EDITOR</div>
        <textarea id="liveInput" placeholder="เลือกปุ่มเพื่อแก้ไขลายไฟ..."></textarea>
        <div id="saveIndicator"></div>

        <div class="slider-box">
            <div class="slider-header">
                <span>Slow (1)</span>
                <span id="speedDisplay" style="color:#00e676; font-weight:bold;">Speed: 5</span>
                <span>Fast (9)</span>
            </div>
            <input type="range" id="speedSlider" min="1" max="9" value="5">
        </div>

        <div style="text-align: left; font-size: 12px; color: #bbb; margin-bottom: 5px;">FX LIBRARY (50 PRESETS - DRAG TO SWAP)</div>
        <div id="presetGrid" class="preset-grid"></div>
    </div>

    <script>
        let device, characteristic;
        let selectedIndex = -1;
        // ปรับ patterns ให้เก็บเป็น Object เพื่อรองรับทั้ง code และ speed
        let patterns = Array.from({length: 50}, () => ({ code: "", speed: 5 }));
        let buttonOrder = Array.from({length: 50}, (_, i) => i); 
        let autoSaveTimeout = null;

        const liveInput = document.getElementById('liveInput');
        const presetGrid = document.getElementById('presetGrid');
        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');
        const saveIndicator = document.getElementById('saveIndicator');

        // 1. วาดปุ่มตามลำดับ (buttonOrder)
        function renderButtons() {
            presetGrid.innerHTML = '';
            buttonOrder.forEach((originalIdx) => {
                const btn = document.createElement('div');
                btn.className = 'btn-fx' + (selectedIndex === originalIdx ? ' active' : '');
                btn.innerText = "FX " + (originalIdx + 1);
                btn.setAttribute('data-id', originalIdx); 
                
                btn.onclick = () => {
                    selectedIndex = originalIdx;
                    const data = patterns[originalIdx];
                    
                    // ดึงค่ามาแสดงผล
                    liveInput.value = data.code;
                    speedSlider.value = data.speed;
                    speedDisplay.innerText = "Speed: " + data.speed;
                    
                    renderButtons();
                    sendBluetooth(data.code); // เล่นลายไฟทันที
                };
                presetGrid.appendChild(btn);
            });
        }

        // ระบบลากวางพร้อมบันทึกลำดับ
        new Sortable(presetGrid, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            delay: 200, 
            delayOnTouchOnly: true,
            onEnd: function () {
                const newOrder = Array.from(presetGrid.children).map(el => parseInt(el.getAttribute('data-id')));
                buttonOrder = newOrder;
                saveIndicator.innerText = "Saving Order...";
                sendBluetooth("ORDER:" + buttonOrder.join(','));
                setTimeout(() => { saveIndicator.innerText = ""; }, 1000);
            }
        });

        // 2. ระบบ Auto-Save & Live Update
        function handleUpdate() {
            if (selectedIndex === -1) return;
            let code = liveInput.value;
            let speed = speedSlider.value;
            
            patterns[selectedIndex].code = code;
            patterns[selectedIndex].speed = speed;
            
            sendBluetooth(code);

            saveIndicator.innerText = "Writing to ESP32...";
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                // ส่งคำสั่งเซฟ S[index]:[code] บอร์ดจะบันทึกความเร็วจากตัวเลขหน้าสุดให้อัตโนมัติ
                sendBluetooth("S" + selectedIndex + ":" + code); 
                saveIndicator.innerText = "✅ Saved to Board";
                setTimeout(() => { saveIndicator.innerText = ""; }, 1500);
            }, 500);
        }

        liveInput.addEventListener('input', handleUpdate);

        speedSlider.oninput = function() {
            let speed = this.value;
            speedDisplay.innerText = "Speed: " + speed;
            if (liveInput.value && liveInput.value !== "off") {
                let currentCode = liveInput.value;
                if (!isNaN(currentCode.charAt(0))) {
                    liveInput.value = speed + currentCode.substring(1);
                } else {
                    liveInput.value = speed + " m " + currentCode;
                }
                handleUpdate();
            }
        };

        // 3. Bluetooth & Sync (ORD: ลำดับ, D:speed:code)
        document.getElementById('connectBtn').onclick = async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'PocketDJ-' }],
                    optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
                characteristic = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let val = new TextDecoder().decode(e.target.value);
                    
                    if (val.startsWith("ORD:")) {
                        let ordStr = val.substring(4);
                        if (ordStr) {
                            buttonOrder = ordStr.split(',').map(Number);
                            renderButtons();
                        }
                    }
                    
                    // รับข้อมูลลายไฟ D[idx]:[speed]:[code]
                    if (val.startsWith("D")) {
                        let parts = val.substring(1).split(":");
                        let idx = parseInt(parts[0]);
                        let speed = parts[1];
                        let code = parts[2] || "";
                        
                        patterns[idx] = { code: code, speed: speed };
                        
                        renderButtons();
                        document.getElementById('status').innerText = "● Syncing (" + (idx+1) + "/50)";
                        if(idx === 49) {
                             document.getElementById('status').innerText = "● Ready";
                             document.getElementById('status').style.color = "#00e676";
                        }
                    }
                });

                document.getElementById('status').innerText = "● Connected: Syncing...";
                sendBluetooth("GET_ALL"); 

            } catch (e) { console.log(e); }
        };

        async function sendBluetooth(val) {
            if (!characteristic || !val) return;
            try {
                await characteristic.writeValue(new TextEncoder().encode(val));
            } catch (e) { console.log("BT Error:", e); }
        }

        renderButtons();
    </script>
</body>
</html>
